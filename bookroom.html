<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Room | BookMySuite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-container" style="max-width: 650px; margin-top: 50px;">
        <div id="booking-interface">
            <h2>Complete Your Booking</h2>
            <form id="bookingForm">
                <label>Assigned Room ID</label>
                <input type="text" id="roomIdDisplay" readonly style="background: #f0f0f0;">

                <div style="display: flex; gap: 20px; margin-top: 15px;">
                    <div style="flex: 1;">
                        <label>Check-in Date</label>
                        <input type="date" id="checkIn" required>
                    </div>
                    <div style="flex: 1;">
                        <label>Check-out Date</label>
                        <input type="date" id="checkOut" required>
                    </div>
                </div>

                <label style="margin-top: 15px; display: block;">Identity Proof Type</label>
                <select id="idProof" required style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                    <option value="">Select ID Type</option>
                    <option value="Aadhaar">Aadhaar Card</option>
                    <option value="PAN">PAN Card</option>
                    <option value="Passport">Passport</option>
                </select>

                <div id="priceBreakdown" style="background: #f4f8f9; padding: 20px; border-radius: 10px; margin: 20px 0; border: 1px solid #ddd;">
                    <p>Stay Duration: <span id="daysCount" style="font-weight: bold;">0 nights</span></p>
                    <p>Total Amount: <span id="totalPrice" style="font-weight: bold; color: #008080;">₹0</span></p>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Confirm & Pay</button>
            </form>
        </div>

        <div id="receiptSection" style="display: none;" class="receipt-box">
            <h2 style="color: #008080;">Booking Confirmed!</h2>
            <hr>
            <p><strong>User ID:</strong> <span id="recUserId"></span></p>
            <p><strong>Room:</strong> <span id="recRoomId"></span></p>
            <p><strong>Dates:</strong> <span id="recDates"></span></p>
            <p><strong>ID Type:</strong> <span id="recId"></span></p>
            <button onclick="window.print()" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Download Receipt</button>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            document.getElementById('roomIdDisplay').value = urlParams.get('room') || 'N7';

            const checkInInput = document.getElementById('checkIn');
            const checkOutInput = document.getElementById('checkOut');
            const daysDisplay = document.getElementById('daysCount');
            const priceDisplay = document.getElementById('totalPrice');

            function updatePrice() {
                const start = new Date(checkInInput.value);
                const end = new Date(checkOutInput.value);
                
                if (checkInInput.value && checkOutInput.value && end > start) {
                    const diffTime = Math.abs(end - start);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    daysDisplay.innerText = `${diffDays} nights`;
                    priceDisplay.innerText = `₹${diffDays * 4999}`;
                } else {
                    daysDisplay.innerText = `0 nights`;
                    priceDisplay.innerText = `₹0`;
                }
            }

            checkInInput.addEventListener('change', updatePrice);
            checkOutInput.addEventListener('change', updatePrice);

            document.getElementById('bookingForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const userId = localStorage.getItem('userId');
                
                const bookingData = {
                    user_id: userId,
                    room_id: document.getElementById('roomIdDisplay').value,
                    check_in: checkInInput.value,
                    check_out: checkOutInput.value,
                    identity_proof: document.getElementById('idProof').value
                };

                const res = await fetch('http://localhost:3000/book-room', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData)
                });

                const result = await res.json();
                if (result.success) {
                    document.getElementById('booking-interface').style.display = 'none';
                    document.getElementById('receiptSection').style.display = 'block';
                    document.getElementById('recUserId').innerText = userId;
                    document.getElementById('recRoomId').innerText = bookingData.room_id;
                    document.getElementById('recDates').innerText = `${bookingData.check_in} to ${bookingData.check_out}`;
                    document.getElementById('recId').innerText = bookingData.identity_proof;
                } else {
                    alert("Error: " + result.message);
                }
            });
        });
    </script>
</body>
</html>
