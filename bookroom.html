<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Room | BookMySuite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="brand-name">BookMySuite</div>
            <a href="homepage.html" class="btn">Back to Home</a>
        </nav>
    </header>

    <main class="auth-container" style="max-width: 650px;">
        <div id="booking-interface">
            <h2>Complete Your Booking</h2>
            <form id="bookingForm">
                <label>Assigned Room ID</label>
                <input type="text" id="roomIdDisplay" name="room_id" readonly style="background: #f0f0f0;">

                <div style="display: flex; gap: 20px;">
                    <div style="flex: 1;">
                        <label>Check-in Date</label>
                        <input type="date" id="checkIn" name="check_in" required>
                    </div>
                    <div style="flex: 1;">
                        <label>Check-out Date</label>
                        <input type="date" id="checkOut" name="check_out" required>
                    </div>
                </div>

                <label>Upload ID Proof (Aadhaar/Passport)</label>
                <input type="file" name="govt_id" required>

                <div id="priceBreakdown" style="background: #f4f8f9; padding: 20px; border-radius: 10px; margin: 20px 0; border: 1px solid #ddd;">
                    <p style="display: flex; justify-content: space-between;">Stay Duration: <span id="daysCount">0 nights</span></p>
                    <p style="display: flex; justify-content: space-between;">Rate per Night: <span>₹4,999</span></p>
                    <hr style="margin: 10px 0; opacity: 0.2;">
                    <p style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.2rem;">
                        Total Amount: <span id="totalPrice">₹0</span>
                    </p>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Confirm & Pay</button>
            </form>
        </div>

        <!-- Hidden Receipt Section -->
        <div id="receiptSection" style="display: none;" class="receipt-box">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2 style="color: var(--primary-teal);">Booking Confirmed!</h2>
                <p>Thank you for choosing BookMySuite.</p>
            </div>
            <div style="border-top: 2px solid #eee; padding-top: 20px;">
                <p><strong>Booking Receipt</strong></p>
                <p>User ID: <span id="recUserId"></span></p>
                <p>Room Number: <span id="recRoomId"></span></p>
                <p>Stay: <span id="recDates"></span></p>
                <p>Total Paid: <strong id="recTotal"></strong></p>
            </div>
            <button onclick="window.print()" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Download Receipt (PDF)</button>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Ensure the DOM is fully loaded before running scripts
        document.addEventListener('DOMContentLoaded', () => {
            // Detect Room ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const room = urlParams.get('room') || 'S7';
            const roomIdInput = document.getElementById('roomIdDisplay');
            if(roomIdInput) roomIdInput.value = room;

            const checkIn = document.getElementById('checkIn');
            const checkOut = document.getElementById('checkOut');

            // Handle Form Submission
            const bookingForm = document.getElementById('bookingForm');
            if (bookingForm) {
                bookingForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    // 1. Get User Info from LocalStorage - Improved check
                    const userId = localStorage.getItem('userId') || localStorage.getItem('user_id');
                    
                    if (!userId) {
                        alert("Session expired. Please login again.");
                        window.location.href = 'login.html';
                        return;
                    }

                    const bookingData = {
                        user_id: userId,
                        room_id: document.getElementById('roomIdDisplay').value,
                        check_in: checkIn.value,
                        check_out: checkOut.value
                    };

                    try {
                        // 2. SEND DATA TO SERVER
                        const response = await fetch('http://localhost:3000/book-room', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(bookingData)
                        });

                        const result = await response.json();

                        if (result.success) {
                            // 3. SHOW RECEIPT
                            document.getElementById('booking-interface').style.display = 'none';
                            document.getElementById('receiptSection').style.display = 'block';
                            
                            document.getElementById('recUserId').innerText = userId;
                            document.getElementById('recRoomId').innerText = bookingData.room_id;
                            document.getElementById('recDates').innerText = `${checkIn.value} to ${checkOut.value}`;
                            document.getElementById('recTotal').innerText = document.getElementById('totalPrice').innerText;
                        } else {
                            alert("Booking failed: " + result.message);
                        }
                    } catch (error) {
                        console.error("Booking Error:", error);
                        alert("Could not connect to server.");
                    }
                });
            }
        });
    </script>
</body>
</html>
