<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | BookMySuite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Join BookMySuite</h2>
        <form id="signupForm">
            <label>Full Name</label>
            <input type="text" name="name" required>

            <label>Phone Number</label>
            <input type="tel" name="phone" pattern="[0-9]{10}" placeholder="10-digit mobile" required>

            <label>Email Address</label>
            <input type="email" name="email" required>

            <label>Password (Min 8 chars + 1 Special)</label>
            <div class="pass-wrapper">
                <input type="password" id="regPass" name="password" 
                       pattern="^(?=.*[!@#$%^&*])(?=.{8,}).*$" required>
                <span class="toggle-pass" onclick="togglePassword('regPass')">👁️</span>
            </div>

            <label>Register As</label>
            <select name="role" id="roleSelect" onchange="checkAdminRole()">
                <option value="user">Traveler</option>
                <option value="admin">Hotel Admin</option>
            </select>

            <div id="adminCodeSection" style="display:none; margin-top: 15px; padding: 10px; border: 1px solid var(--accent-red); border-radius: 8px;">
                <label style="color: var(--accent-red);">Admin Security Code</label>
                <input type="password" name="adminCode" placeholder="Enter security code">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 25px;">Create Account</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
