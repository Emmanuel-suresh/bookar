<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Stays | BookMySuite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-bg">
    <nav class="glass-nav">
        <div class="logo">BookMySuite</div>
        <div class="nav-user" id="userDisplay">
            <!-- JavaScript will insert: Hi, Emmanuel (BMS-2026-1234) -->
        </div>
        <button onclick="logout()" class="logout-link">Logout</button>
    </nav>

    <header class="hero-section">
        <div class="hero-content fade-in">
            <h1>Experience Pure Elegance</h1>
            <p>Your sanctuary of comfort and style awaits.</p>
            <a href="#suites" class="btn-scroll">Explore Suites ↓</a>
        </div>
    </header>

    <main id="suites" class="suite-container">
        <h2 class="section-title">Our Signature Suites</h2>
        
        <div class="glass-grid">
            <!-- Suite Card: S7 -->
            <div class="glass-card">
                <div class="card-badge">Top Rated</div>
                <img src="https://images.unsplash.com/photo-1631049307264-da0ec9d70304?auto=format&fit=crop&w=800" alt="Executive Suite">
                <div class="card-info">
                    <h3>Executive Suite S7</h3>
                    <p>Panoramic city views & private lounge access.</p>
                    <div class="card-footer">
                        <span class="price">₹4,999<span>/night</span></span>
                        <button onclick="location.href='bookroom.html?room=S7'" class="btn-book">Reserve</button>
                    </div>
                </div>
            </div>

            <!-- Suite Card: N7 -->
            <div class="glass-card">
                <div class="card-badge">Popular</div>
                <img src="https://images.unsplash.com/photo-1618773928121-c32242e63f39?auto=format&fit=crop&w=800" alt="Deluxe Room">
                <div class="card-info">
                    <h3>Deluxe Room N7</h3>
                    <p>Modern minimalism meets ultimate comfort.</p>
                    <div class="card-footer">
                        <span class="price">₹3,500<span>/night</span></span>
                        <button onclick="location.href='bookroom.html?room=N7'" class="btn-book">Reserve</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
    // Check for userId (camelCase) or user_id (snake_case)
    const name = localStorage.getItem('userName') || 'Guest';
    const id = localStorage.getItem('userId') || localStorage.getItem('user_id') || 'BMS-2026-0000';
    
    const userDisplay = document.getElementById('userDisplay');
    if (userDisplay) {
        userDisplay.innerHTML = `Hi, <strong>${name}</strong> (${id})`;
    }
</script>
</body>
</html>
