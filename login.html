<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BookMySuite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="brand-name">BookMySuite</div>
            <a href="homepage.html" class="btn">Home</a>
        </nav>
    </header>

    <main class="auth-container">
        <h2>Welcome Back</h2>
        <p style="margin-bottom: 20px; color: #666;">Please enter your details to continue.</p>
        
        <!-- The action targets the app.post('/login') route in server.js -->
        <form action="/login" method="POST" id="loginForm">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="email@example.com" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
                Login
            </button>
        </form>

        <p style="margin-top: 20px; text-align: center;">
            New to BookMySuite? <a href="signup.html" style="color: var(--primary-teal);">Create an account</a>
        </p>
    </main>

    <!-- Essential to link script.js for potential validation and UI logic -->
    <script src="script.js"></script>
</body>
</html>
