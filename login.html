<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BookMySuite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="email@example.com" required>

            <label>Password</label>
            <div class="pass-wrapper">
                <input type="password" id="loginPass" name="password" required>
                <span class="toggle-pass" onclick="togglePassword('loginPass')">👁️</span>
            </div>

            <label>Login As</label>
            <select name="role">
                <option value="user">Traveler</option>
                <option value="admin">Hotel Admin</option>
            </select>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Login</button>
        </form>
        <p style="margin-top: 15px; text-align: center;">
            Don't have an account? <a href="signup.html" style="color: var(--primary-teal);">Register here</a>
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
