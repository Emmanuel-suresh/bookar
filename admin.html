<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | BookMySuite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2>BookMySuite Admin</h2>
        <button onclick="logout()" class="btn btn-primary">Logout</button>
    </nav>

    <main style="padding: 30px 5%;">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
            <div>
                <h3>Room Inventory Control</h3>
                <p>Manage room IDs (e.g., S7, N7) and availability.</p>
            </div>
            <button class="btn btn-primary">+ Add New Room</button>
        </div>

       <section class="active-bookings">
    <h2>Active Bookings & Stay Duration</h2>
    <table class="admin-table">
        <thead>
            <tr>
                <th>User ID</th>
                <th>Customer</th>
                <th>Room ID</th>
                <th>Check-In</th>
                <th>Check-Out</th>
                <th>Days</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="bookingsTableBody">
            <!-- Data will be injected here -->
        </tbody>
    </table>
</section>

<script src="script.js"></script>
</body>
</html>
