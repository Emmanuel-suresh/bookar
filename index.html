<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMySuite | Luxury Awaits</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1920');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center; text-align: center; color: white;
        }
        .glass-hero {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 60px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="glass-hero">
            <h1 style="font-size: 3.5rem; margin-bottom: 1rem;">BookMySuite</h1>
            <p style="font-size: 1.2rem; margin-bottom: 2rem;">Elegance, Comfort, and Luxury Redefined.</p>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <a href="login.html" class="btn btn-primary">Login</a>
                <a href="signup.html" class="btn" style="background: white; color: var(--dark-slate);">Register</a>
            </div>
        </div>
    </div>
</body>
</html>
