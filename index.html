<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMySuite | Your Suite, Perfectly Booked</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo-container">
                <!-- Branding updated to BookMySuite -->
                <span class="brand-name">BookMySuite</span>
                <div class="logo-box">
                    <span class="logo-inner">B</span>
                </div>
            </div>
            <div class="hamburger">☰</div>
        </nav>
        <div class="sub-nav">
            <span>Hotels</span>
            <span>Suites</span>
            <span>Resorts</span>
            <span>Offers</span>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Book with BookMySuite</h1>
            <p class="hero-subtitle">Your Suite, Perfectly Booked</p>
            
            <div class="btn-group">
                <a href="#" class="btn btn-login">Login</a>
                <a href="#" class="btn btn-signup">Sign Up</a>
            </div>
        </section>

        <section class="grid-container">
            <!-- Card 1 -->
            <article class="card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=400&q=80" alt="Luxury Suite">
                </div>
                <div class="card-line"></div>
                <div class="card-line short"></div>
            </article>

            <!-- Card 2 -->
            <article class="card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?auto=format&fit=crop&w=400&q=80" alt="Ocean View">
                </div>
                <div class="card-line"></div>
                <div class="card-line short"></div>
            </article>

            <!-- Card 3 -->
            <article class="card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?auto=format&fit=crop&w=400&q=80" alt="Mountain Retreat">
                </div>
                <div class="card-line"></div>
                <div class="card-line short"></div>
            </article>

            <!-- Card 4 -->
            <article class="card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=400&q=80" alt="City View">
                </div>
                <div class="card-line"></div>
                <div class="card-line short"></div>
            </article>
        </section>
    </main>

</body>
</html>
