<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookora | Premium Hotel Bookings</title>
    <!-- Linking the separate CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Navigation per the sketch -->
    <header>
        <nav>
            <div class="logo-container">
                <span class="brand-name">Bookora</span>
                <!-- Logo box from your drawing -->
                <div class="logo-box"></div>
            </div>
            <!-- Hamburger menu icon -->
            <div class="hamburger">☰</div>
        </nav>
        <!-- The secondary nav links (the wavy lines in the sketch) -->
        <div class="sub-nav">
            <span>Hotels</span>
            <span>Flights</span>
            <span>Resorts</span>
            <span>Offers</span>
        </div>
    </header>

    <!-- Hero Section -->
    <main>
        <section class="hero">
            <h1>Book with Bookora</h1>
            <span class="hero-subtitle">Find your next adventure</span>
            
            <div class="btn-group">
                <a href="#" class="btn btn-login">Login</a>
                <a href="#" class="btn btn-signup">Sign Up</a>
            </div>
        </section>

        <!-- Bottom Grid Section (4 Cards) -->
        <section class="grid-container">
            <!-- Card 1 -->
            <article class="card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=400&q=80" alt="Luxury Room">
                </div>
                <div class="card-line"></div>
                <div class="card-line short"></div>
            </article>

            <!-- Card 2 -->
            <article class="card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?auto=format&fit=crop&w=400&q=80" alt="Ocean View">
                </div>
                <div class="card-line"></div>
                <div class="card-line short"></div>
            </article>

            <!-- Card 3 -->
            <article class="card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?auto=format&fit=crop&w=400&q=80" alt="Mountain Resort">
                </div>
                <div class="card-line"></div>
                <div class="card-line short"></div>
            </article>

            <!-- Card 4 -->
            <article class="card">
                <div class="card-img">
                    <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=400&q=80" alt="City Hotel">
                </div>
                <div class="card-line"></div>
                <div class="card-line short"></div>
            </article>
        </section>
    </main>

</body>
</html>
